// Protocol buffer schema for rinnsal event logging.
//
// To regenerate events_pb2.py:
//   python -m grpc_tools.protoc --python_out=. -I. events.proto

syntax = "proto3";

package rinnsal;

// A single logged event
message Event {
  // Timestamp in seconds since epoch
  double timestamp = 1;

  // Iteration number
  int64 iteration = 2;

  // The actual data (one of the following)
  oneof data {
    Scalar scalar = 3;
    Text text = 4;
    Figure figure = 5;
    Checkpoint checkpoint = 6;
  }
}

// A scalar value (e.g., loss, accuracy)
message Scalar {
  string tag = 1;
  double value = 2;
}

// A text string (e.g., logs, summaries)
message Text {
  string tag = 1;
  string value = 2;
}

// A figure reference (data stored in separate .cpkl file)
message Figure {
  string tag = 1;
  string path = 2;  // relative path to .cpkl file
  bool interactive = 3;
}

// A checkpoint reference (data stored in separate .cpkl file)
message Checkpoint {
  string tag = 1;
  string path = 2;  // relative path to .cpkl file
}
